apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-gateway.fullname" . }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "api-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "api-gateway.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
              value: {{ .Values.env.SPRING_CLOUD_GATEWAY_ROUTES_0_ID | quote }}
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: {{ .Values.env.SPRING_CLOUD_GATEWAY_ROUTES_0_URI | quote }}
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
              value: {{ .Values.env.SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0 | quote }}
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ID
              value: {{ .Values.env.SPRING_CLOUD_GATEWAY_ROUTES_1_ID | quote }}
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: {{ .Values.env.SPRING_CLOUD_GATEWAY_ROUTES_1_URI | quote }}
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0
              value: {{ .Values.env.SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0 | quote }}
            - name: APP_SECURITY_CORS_ALLOWED_ORIGINS_0
              value: {{ .Values.env.APP_SECURITY_CORS_ALLOWED_ORIGINS_0 | quote }}
            - name: APP_SECURITY_CORS_ALLOWED_ORIGINS_1
              value: {{ .Values.env.APP_SECURITY_CORS_ALLOWED_ORIGINS_1 | quote }}
            - name: KEYCLOAK_BASE_URL
              value: {{ .Values.env.KEYCLOAK_BASE_URL | quote }}
            - name: KEYCLOAK_REALMS
              value: {{ .Values.env.KEYCLOAK_REALMS | quote }}
            - name: CLIENT_ID
              value: {{ .Values.keycloak.clientId | quote }}
            - name: CLIENT_SECRET
              value: {{ .Values.keycloak.clientSecret | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}